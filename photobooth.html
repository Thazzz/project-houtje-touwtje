<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Booth</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*,
*::before,
*::after{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
font-family:Inter,system-ui,sans-serif;
background:
linear-gradient(180deg,rgba(255,255,255,0.04),transparent 30%),
linear-gradient(135deg,#171717,#0d0d0d 60%,#1b1b1b);
color:#f2f2f2;
}

#app{
min-height:100vh;
display:grid;
grid-template-rows:auto 1fr auto;
gap:20px;
padding:24px;
}

.topbar{
display:grid;
grid-template-columns:minmax(0,1fr) minmax(140px,180px) auto;
gap:20px;
align-items:start;
}

.intro h1{
margin:0 0 8px 0;
font-size:clamp(28px,4vw,44px);
letter-spacing:.04em;
}

.intro p{
margin:0;
max-width:700px;
font-size:clamp(16px,2vw,22px);
color:#d2d2d2;
line-height:1.4;
}

.steps{
margin:16px 0 0 0;
padding-left:24px;
max-width:760px;
color:#dddddd;
font-size:clamp(13px,1.2vw,16px);
line-height:1.55;
}

.steps li + li{
margin-top:6px;
}

.status{
margin-top:14px;
display:inline-block;
padding:10px 14px;
border-radius:999px;
background:rgba(255,255,255,0.08);
color:#fafafa;
font-size:15px;
letter-spacing:.02em;
opacity:0;
transition:opacity .18s ease;
}

.status.show{
opacity:1;
}

.qrbox{
width:min(26vw,220px);
padding:14px;
border-radius:18px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.08);
text-align:center;
box-shadow:0 16px 40px rgba(0,0,0,0.28);
}

#qr{
display:inline-block;
background:#fff;
padding:10px;
border-radius:12px;
}

.qrbox p{
margin:12px 0 0 0;
font-size:14px;
color:#d8d8d8;
}

.side-preview{
height:100%;
min-height:220px;
padding:10px;
border-radius:22px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 16px 40px rgba(0,0,0,0.22);
display:grid;
place-items:center;
}

.side-preview img{
width:100%;
height:100%;
display:block;
object-fit:contain;
border-radius:16px;
}

.side-placeholder{
text-align:center;
font-size:14px;
line-height:1.4;
color:#cfcfcf;
}

.stage{
position:relative;
min-height:0;
max-height:min(56vh,680px);
padding:20px;
overflow:hidden;
border-radius:28px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
}

.placeholder{
padding:40px;
text-align:center;
color:#bdbdbd;
font-size:clamp(20px,3vw,34px);
line-height:1.4;
}

.flash{
position:absolute;
inset:0;
background:rgba(255,255,255,0.92);
opacity:0;
pointer-events:none;
}

.flash.show{
animation:flash .32s ease;
}

@keyframes flash{
0%{opacity:0;}
35%{opacity:1;}
100%{opacity:0;}
}

.hero-wrap{
position:absolute;
inset:20px 20px 88px 20px;
display:grid;
place-items:center;
}

.hero-photo{
max-width:100%;
max-height:100%;
width:auto;
height:auto;
display:block;
object-fit:contain;
border-radius:18px;
box-shadow:0 22px 55px rgba(0,0,0,0.35);
}

.caption{
position:absolute;
left:24px;
right:24px;
bottom:20px;
padding:12px 16px;
border-radius:14px;
background:rgba(0,0,0,0.52);
font-size:18px;
line-height:1.35;
text-align:center;
opacity:0;
pointer-events:none;
}

.caption.show{
opacity:1;
}

.stack{
display:flex;
gap:14px;
overflow:hidden;
padding-bottom:4px;
}

.thumb{
width:108px;
height:81px;
flex:0 0 auto;
object-fit:cover;
border-radius:12px;
border:3px solid rgba(255,255,255,0.92);
background:#fff;
box-shadow:0 10px 24px rgba(0,0,0,0.22);
}

@media (max-width:900px){
.topbar{
grid-template-columns:1fr auto;
}

.qrbox{
width:fit-content;
}

.side-preview{
display:none;
}

.thumb{
width:86px;
height:65px;
}
}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="intro">
      <h1>Photo Booth</h1>
      <p>Volg deze stappen en zie je foto hier terug.</p>
      <ol class="steps">
        <li>Scan de QR met jouw eigen telefoon.</li>
        <li>Maak een foto of kies een foto uit je galerij.</li>
        <li>Upload de foto en zie hem hier verschijnen.</li>
      </ol>
      <div class="status" id="status">Wachten op nieuwe foto's</div>
    </div>
    <aside class="side-preview">
      <div class="side-placeholder" id="sidePlaceholder">Nieuwste foto</div>
      <img id="sidePhoto" alt="Laatste upload" hidden>
    </aside>
    <div class="qrbox">
      <div id="qr"></div>
      <p>Scan om foto's te uploaden</p>
    </div>
  </header>

  <main class="stage">
    <div class="flash" id="flash"></div>
    <div class="placeholder" id="placeholder">Jouw foto verschijnt hier</div>
    <div class="hero-wrap" id="heroWrap" hidden>
      <img id="heroPhoto" class="hero-photo" alt="Nieuwste foto">
    </div>
    <div class="caption" id="caption"></div>
  </main>

  <section class="stack" id="stack"></section>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script>
const supabaseUrl = "https://gfhnjiyslyualbfbvzmb.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmaG5qaXlzbHl1YWxiZmJ2em1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgwOTQsImV4cCI6MjA4ODc5NDA5NH0.fOIy6UCpEuYWVBcBpGnr64s8Ua3qjEzRv-WLXJKAfgw"
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

const MAX_STACK = 8

const heroPhoto = document.getElementById("heroPhoto")
const heroWrap = document.getElementById("heroWrap")
const placeholder = document.getElementById("placeholder")
const caption = document.getElementById("caption")
const stack = document.getElementById("stack")
const flash = document.getElementById("flash")
const status = document.getElementById("status")
const sidePhoto = document.getElementById("sidePhoto")
const sidePlaceholder = document.getElementById("sidePlaceholder")

const captions = {}
const shownUrls = new Set()

function createQR(){
  const uploadURL = window.location.origin + "/upload.html"

  new QRCode(document.getElementById("qr"), {
    text: uploadURL,
    width: 160,
    height: 160
  })
}

function setStatus(text, hold = 2200){
  status.textContent = text
  status.classList.add("show")

  clearTimeout(setStatus.timer)
  setStatus.timer = setTimeout(() => {
    status.classList.remove("show")
  }, hold)
}

function showFlash(){
  flash.classList.remove("show")
  void flash.offsetWidth
  flash.classList.add("show")
}

function showCaption(text){
  if(!text){
    caption.textContent = ""
    caption.classList.remove("show")
    return
  }

  caption.textContent = text
  caption.classList.add("show")
}

function addToStack(url){
  if(heroPhoto.src === url){
    return
  }

  const existing = stack.querySelector(`[data-url="${url}"]`)
  if(existing){
    existing.remove()
  }

  const img = document.createElement("img")
  img.src = url
  img.alt = "Geuploade foto"
  img.className = "thumb"
  img.dataset.url = url

  stack.prepend(img)

  while(stack.children.length > MAX_STACK){
    stack.lastElementChild.remove()
  }
}

function showPhoto(url, text){
  placeholder.hidden = true
  heroWrap.hidden = false
  heroPhoto.removeAttribute("width")
  heroPhoto.removeAttribute("height")
  heroPhoto.src = url
  sidePhoto.hidden = false
  sidePhoto.src = url
  sidePlaceholder.hidden = true
  showCaption(text)
  const existingHeroThumb = stack.querySelector(`[data-url="${url}"]`)
  if(existingHeroThumb){
    existingHeroThumb.remove()
  }
  addToStack(url)
  showFlash()
  setStatus("Upload geslaagd")
}

async function fetchCaptions(){
  try{
    const { data, error } = await supabaseClient
      .from("photos")
      .select("filename,caption")

    if(error || !data) return

    for(const row of data){
      captions[row.filename] = row.caption || null
    }
  }catch(error){
    console.log("caption load error", error)
  }
}

async function loadRecentPhotos(){
  let files = []

  try{
    const { data, error } = await supabaseClient.storage
      .from("party")
      .list("", {
        limit: MAX_STACK,
        offset: 0,
        sortBy: { column: "name", order: "desc" }
      })

    if(error || !data) return

    files = data.filter(file => file.name && !file.name.endsWith("/"))
  }catch(error){
    console.log("photo load error", error)
    return
  }

  if(files.length === 0) return

  const urls = files.map(file => {
    const url = supabaseUrl + "/storage/v1/object/public/party/" + file.name
    shownUrls.add(url)
    return { url, fileName: file.name }
  })

  const latest = urls[0]
  showPhoto(latest.url, captions[latest.fileName] || null)

  for(const item of urls.slice(1)){
    addToStack(item.url)
  }

  setStatus("Klaar voor nieuwe uploads")
}

function subscribeBroadcast(){
  supabaseClient
    .channel("party-live")
    .on("broadcast", { event: "new-photo" }, payload => {
      const url = payload.payload.url
      const text = payload.payload.caption || null
      const fileName = url.split("/").pop()

      captions[fileName] = text
      shownUrls.add(url)

      showPhoto(url, text)
    })
    .subscribe()
}

async function start(){
  createQR()
  setStatus("Verbinden...")
  await fetchCaptions()
  await loadRecentPhotos()
  subscribeBroadcast()
}

start()
</script>
</body>
</html>
