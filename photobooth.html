<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Booth</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*,
*::before,
*::after{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
font-family:Inter,system-ui,sans-serif;
background:
linear-gradient(180deg,rgba(255,255,255,0.04),transparent 30%),
linear-gradient(135deg,#171717,#0d0d0d 60%,#1b1b1b);
color:#f2f2f2;
overflow:hidden;
}

#app{
height:100vh;
display:grid;
grid-template-rows:minmax(0,82%) minmax(0,18%);
gap:0;
padding:16px;
}

.top-section{
display:grid;
grid-template-columns:15% 1fr 10%;
gap:24px;
min-height:0;
padding-bottom:14px;
}

.intro{
min-width:0;
padding-top:8px;
}

.intro h1{
margin:0 0 8px 0;
font-size:clamp(28px,4vw,44px);
letter-spacing:.04em;
}

.intro p{
margin:0;
max-width:700px;
font-size:clamp(15px,1.6vw,20px);
color:#d2d2d2;
line-height:1.4;
}

.steps{
margin:16px 0 0 0;
padding-left:24px;
max-width:760px;
color:#dddddd;
font-size:clamp(13px,1.2vw,16px);
line-height:1.55;
}

.steps li + li{
margin-top:6px;
}

.status{
margin-top:14px;
display:inline-block;
padding:10px 14px;
border-radius:999px;
background:rgba(255,255,255,0.08);
color:#fafafa;
font-size:15px;
letter-spacing:.02em;
opacity:0;
transition:opacity .18s ease;
}

.status.show{
opacity:1;
}

.qrbox{
width:100%;
max-width:180px;
padding:14px;
border-radius:18px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.08);
text-align:center;
box-shadow:0 16px 40px rgba(0,0,0,0.28);
align-self:start;
justify-self:end;
}

#qr{
display:inline-block;
background:#fff;
padding:10px;
border-radius:12px;
width:128px;
}

#qr img,
#qr canvas{
display:block;
width:100%;
height:auto;
}

.qrbox p{
margin:12px 0 0 0;
font-size:14px;
color:#d8d8d8;
}

.stage{
position:relative;
min-height:0;
height:100%;
padding:0;
overflow:hidden;
border-radius:28px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
}

.placeholder{
position:absolute;
inset:24px;
display:grid;
place-items:center;
padding:40px;
text-align:center;
color:#bdbdbd;
font-size:clamp(20px,3vw,34px);
line-height:1.4;
}

.flash{
position:absolute;
inset:0;
background:rgba(255,255,255,0.92);
opacity:0;
pointer-events:none;
}

.flash.show{
animation:flash .32s ease;
}

@keyframes flash{
0%{opacity:0;}
35%{opacity:1;}
100%{opacity:0;}
}

.hero-wrap{
position:absolute;
inset:24px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.hero-frame{
position:relative;
display:flex;
align-items:center;
justify-content:center;
width:auto;
height:auto;
max-width:100%;
max-height:100%;
}

.hero-photo{
max-width:100%;
max-height:100%;
width:auto;
height:auto;
display:block;
object-fit:contain;
border-radius:18px;
box-shadow:0 22px 55px rgba(0,0,0,0.35);
flex:0 0 auto;
}

.caption{
position:absolute;
left:0;
right:0;
bottom:0;
padding:12px 16px;
border-radius:14px;
background:rgba(0,0,0,0.52);
font-size:18px;
line-height:1.35;
text-align:center;
opacity:0;
pointer-events:none;
z-index:2;
}

.caption.show{
opacity:1;
}

.bottom-bar{
display:flex;
align-items:center;
gap:14px;
min-height:0;
padding-top:16px;
}

.stack{
display:flex;
gap:14px;
overflow:hidden;
align-items:center;
min-height:0;
flex:1 1 auto;
}

.thumb{
width:108px;
height:81px;
flex:0 0 auto;
object-fit:cover;
border-radius:12px;
border:3px solid rgba(255,255,255,0.92);
background:#fff;
box-shadow:0 10px 24px rgba(0,0,0,0.22);
}

.heart-badge{
flex:0 0 auto;
width:42px;
height:42px;
display:grid;
place-items:center;
opacity:.92;
filter:drop-shadow(0 0 10px rgba(255,62,165,0.35));
}

.heart-badge img{
display:block;
width:100%;
height:100%;
}

@media (max-width:900px){
.top-section{
grid-template-columns:1fr 150px;
grid-template-areas:
"intro qr"
"stage stage";
grid-template-rows:auto 1fr;
gap:16px;
}

.intro{
grid-area:intro;
}

.stage{
grid-area:stage;
}

.qrbox{
grid-area:qr;
width:fit-content;
}

.thumb{
width:86px;
height:65px;
}
}
</style>
</head>
<body>
<div id="app">
  <section class="top-section">
    <div class="intro">
      <h1>Photo Booth</h1>
      <p>Volg deze stappen en zie je foto hier terug.</p>
      <ol class="steps">
        <li>Scan de QR met jouw eigen telefoon.</li>
        <li>Maak een foto of kies een foto uit je galerij.</li>
        <li>Upload de foto en zie hem hier verschijnen.</li>
      </ol>
      <div class="status" id="status">Wachten op nieuwe foto's</div>
    </div>

    <main class="stage">
      <div class="flash" id="flash"></div>
      <div class="placeholder" id="placeholder">Jouw foto verschijnt hier</div>
      <div class="hero-wrap" id="heroWrap" hidden>
        <div class="hero-frame" id="heroFrame">
          <img id="heroPhoto" class="hero-photo" alt="Nieuwste foto">
          <div class="caption" id="caption"></div>
        </div>
      </div>
    </main>

    <div class="qrbox">
      <div id="qr"></div>
      <p>Scan om foto's te uploaden</p>
    </div>
  </section>

  <section class="bottom-bar">
    <div class="stack" id="stack"></div>
    <div class="heart-badge" aria-hidden="true">
      <img src="favicon.svg" alt="">
    </div>
  </section>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script>
const supabaseUrl = "https://gfhnjiyslyualbfbvzmb.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmaG5qaXlzbHl1YWxiZmJ2em1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgwOTQsImV4cCI6MjA4ODc5NDA5NH0.fOIy6UCpEuYWVBcBpGnr64s8Ua3qjEzRv-WLXJKAfgw"
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

const MAX_STACK = 8
const IDLE_REFRESH_MS = 10 * 60 * 1000

const heroPhoto = document.getElementById("heroPhoto")
const heroWrap = document.getElementById("heroWrap")
const heroFrame = document.getElementById("heroFrame")
const placeholder = document.getElementById("placeholder")
const caption = document.getElementById("caption")
const stack = document.getElementById("stack")
const flash = document.getElementById("flash")
const status = document.getElementById("status")

const captions = {}
const shownUrls = new Set()
let idleRefreshTimer

function createQR(){
  const uploadURL = window.location.origin + "/upload.html"

  new QRCode(document.getElementById("qr"), {
    text: uploadURL,
    width: 128,
    height: 128
  })
}

function setStatus(text, hold = 2200){
  status.textContent = text
  status.classList.add("show")

  clearTimeout(setStatus.timer)
  setStatus.timer = setTimeout(() => {
    status.classList.remove("show")
  }, hold)
}

function scheduleIdleRefresh(){
  clearTimeout(idleRefreshTimer)
  idleRefreshTimer = setTimeout(() => {
    window.location.reload()
  }, IDLE_REFRESH_MS)
}

function layoutHeroPhoto(){
  if(heroWrap.hidden || !heroPhoto.naturalWidth || !heroPhoto.naturalHeight){
    return
  }

  const availableWidth = heroWrap.clientWidth
  const availableHeight = heroWrap.clientHeight

  if(!availableWidth || !availableHeight){
    return
  }

  const widthScale = availableWidth / heroPhoto.naturalWidth
  const heightScale = availableHeight / heroPhoto.naturalHeight
  const scale = Math.min(widthScale, heightScale)

  const displayWidth = Math.max(1, Math.floor(heroPhoto.naturalWidth * scale))
  const displayHeight = Math.max(1, Math.floor(heroPhoto.naturalHeight * scale))

  heroFrame.style.width = displayWidth + "px"
  heroFrame.style.height = displayHeight + "px"
  heroPhoto.style.width = displayWidth + "px"
  heroPhoto.style.height = displayHeight + "px"
}

function showFlash(){
  flash.classList.remove("show")
  void flash.offsetWidth
  flash.classList.add("show")
}

function showCaption(text){
  if(!text){
    caption.textContent = ""
    caption.classList.remove("show")
    return
  }

  caption.textContent = text
  caption.classList.add("show")
}

function addToStack(url){
  if(heroPhoto.src === url){
    return
  }

  const existing = stack.querySelector(`[data-url="${url}"]`)
  if(existing){
    existing.remove()
  }

  const img = document.createElement("img")
  img.src = url
  img.alt = "Geuploade foto"
  img.className = "thumb"
  img.dataset.url = url

  stack.prepend(img)

  while(stack.children.length > MAX_STACK){
    stack.lastElementChild.remove()
  }
}

function showPhoto(url, text){
  const previousUrl = heroPhoto.getAttribute("src")

  placeholder.hidden = true
  heroWrap.hidden = false
  heroPhoto.src = url
  showCaption(text)
  const existingHeroThumb = stack.querySelector(`[data-url="${url}"]`)
  if(existingHeroThumb){
    existingHeroThumb.remove()
  }

  if(previousUrl && previousUrl !== url){
    addToStack(previousUrl)
  }

  addToStack(url)
  scheduleIdleRefresh()
  showFlash()
  setStatus("Upload geslaagd")
}

async function fetchCaptions(){
  try{
    const { data, error } = await supabaseClient
      .from("photos")
      .select("filename,caption")

    if(error || !data) return

    for(const row of data){
      captions[row.filename] = row.caption || null
    }
  }catch(error){
    console.log("caption load error", error)
  }
}

async function loadRecentPhotos(){
  let files = []

  try{
    const { data, error } = await supabaseClient.storage
      .from("party")
      .list("", {
        limit: MAX_STACK,
        offset: 0,
        sortBy: { column: "name", order: "desc" }
      })

    if(error || !data) return

    files = data.filter(file => file.name && !file.name.endsWith("/"))
  }catch(error){
    console.log("photo load error", error)
    return
  }

  if(files.length === 0) return

  const urls = files.map(file => {
    const url = supabaseUrl + "/storage/v1/object/public/party/" + file.name
    shownUrls.add(url)
    return { url, fileName: file.name }
  })

  const latest = urls[0]
  showPhoto(latest.url, captions[latest.fileName] || null)

  for(const item of urls.slice(1)){
    addToStack(item.url)
  }

  setStatus("Klaar voor nieuwe uploads")
}

function subscribeBroadcast(){
  supabaseClient
    .channel("party-live")
    .on("broadcast", { event: "new-photo" }, payload => {
      const url = payload.payload.url
      const text = payload.payload.caption || null
      const fileName = url.split("/").pop()

      captions[fileName] = text
      shownUrls.add(url)

      showPhoto(url, text)
    })
    .subscribe()
}

heroPhoto.addEventListener("load", layoutHeroPhoto)
window.addEventListener("resize", layoutHeroPhoto)

async function start(){
  createQR()
  setStatus("Verbinden...")
  scheduleIdleRefresh()
  await fetchCaptions()
  await loadRecentPhotos()
  subscribeBroadcast()
}

start()
</script>
</body>
</html>
