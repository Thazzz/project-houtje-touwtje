<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chris10's PhotoWall</title>

<link rel="stylesheet" href="feest.css">

</head>

<body>

<div id="container">

<div id="overlay">
Chris10's PhotoWall
<div id="sub">
📸 Scan de QR code en upload je foto
</div>
</div>

<div id="newphoto">Nieuwe foto! 📸</div>

<div id="photowall"></div>

<div id="polaroidStack"></div>

<div id="qrbox">
<div id="qr"></div>
<div id="qrtext">Scan om foto's te uploaden</div>
</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>

console.log("photowall gestart")

/* SUPABASE */

const supabaseUrl = "https://gfhnjiyslyualbfbvzmb.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmaG5qaXlzbHl1YWxiZmJ2em1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgwOTQsImV4cCI6MjA4ODc5NDA5NH0.fOIy6UCpEuYWVBcBpGnr64s8Ua3qjEzRv-WLXJKAfgw"

const supabaseClient = supabase.createClient(
supabaseUrl,
supabaseKey
)

/* DATA */

let photos=[]
let knownFiles=new Set()

/* CHANNEL */

const photoChannel = new BroadcastChannel("party-photos")

/* -------------------------------- */
/* PHOTO WALL */
/* -------------------------------- */

function addPhotoToWall(url){

const wall=document.getElementById("photowall")

const img=document.createElement("img")

img.src=url
img.className="wall-photo"

img.style.setProperty(
"--r",
(Math.random()*10-5)+"deg"
)

img.style.left=(10+Math.random()*70)+"%"
img.style.top=(10+Math.random()*60)+"%"

wall.appendChild(img)

if(wall.children.length>15){

const randomIndex=Math.floor(
Math.random()*wall.children.length
)

wall.removeChild(wall.children[randomIndex])

}

}

/* -------------------------------- */
/* POLAROID STACK */
/* -------------------------------- */

function addPolaroidToStack(url){

const stack=document.getElementById("polaroidStack")

const img=document.createElement("img")

img.src=url
img.className="polaroid-item"

img.style.setProperty(
"--r",
(Math.random()*20-10)+"deg"
)

img.style.left=Math.random()*120+"px"
img.style.top=Math.random()*120+"px"

stack.appendChild(img)

if(stack.children.length>8){
stack.removeChild(stack.children[0])
}

}

/* -------------------------------- */
/* NEW PHOTO BANNER */
/* -------------------------------- */

function showNewPhotoBanner(){

const banner=document.getElementById("newphoto")

banner.style.opacity=1

setTimeout(()=>{
banner.style.opacity=0
},3000)

}

/* -------------------------------- */
/* HANDLE NEW PHOTO */
/* -------------------------------- */

function handleNewPhoto(url){

if(knownFiles.has(url)) return

knownFiles.add(url)

photos.unshift(url)

showNewPhotoBanner()
flashQR()

addPhotoToWall(url)
addPolaroidToStack(url)

}

/* -------------------------------- */
/* LOAD EXISTING PHOTOS */
/* -------------------------------- */

async function loadPhotos(){

console.log("foto's laden...")

let allFiles=[]
let offset=0
const limit=100

while(true){

const { data,error } = await supabaseClient
.storage
.from("party")
.list("",{
limit:limit,
offset:offset,
sortBy:{column:"name",order:"desc"}
})

if(error){
console.log(error)
return
}

if(!data || data.length===0) break

allFiles=allFiles.concat(data)

if(data.length<limit) break

offset+=limit

}

for(const file of allFiles){

const url =
supabaseUrl+"/storage/v1/object/public/party/"+file.name

knownFiles.add(url)
photos.push(url)

}

console.log("gevonden foto's:",photos.length)

/* eerste foto's op muur */

for(const url of photos.slice(0,15)){
addPhotoToWall(url)
}

}

/* -------------------------------- */
/* REALTIME SUPABASE */
/* -------------------------------- */

function subscribeRealtime(){

supabaseClient
.channel("party-upload")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"storage",
table:"objects",
filter:"bucket_id=eq.party"
},
(payload)=>{

const file=payload.new.name

const url=
supabaseUrl+"/storage/v1/object/public/party/"+file

handleNewPhoto(url)

}
)
.subscribe()

}

/* -------------------------------- */
/* BROADCAST EVENTS */
/* -------------------------------- */

function subscribeBroadcast(){

supabaseClient
.channel("party-live")
.on("broadcast",{event:"new-photo"},(payload)=>{

const url = payload.payload.url

console.log("broadcast foto:", url)

handleNewPhoto(url)

})
.subscribe()

}

/* -------------------------------- */
/* LOCAL BROADCAST */
/* -------------------------------- */

photoChannel.onmessage=(event)=>{

const url=event.data

handleNewPhoto(url)

}

/* -------------------------------- */
/* QR CODE */
/* -------------------------------- */

function createQR(){

const uploadURL=window.location.origin+"/upload.html"

new QRCode(document.getElementById("qr"),{
text:uploadURL,
width:150,
height:150
})

}

/* -------------------------------- */
/* QR FLASH */
/* -------------------------------- */

function flashQR(){

const qr=document.getElementById("qrbox")

qr.classList.remove("qr-flash")

void qr.offsetWidth

qr.classList.add("qr-flash")

}

/* -------------------------------- */
/* START */
/* -------------------------------- */

async function start(){

createQR()

await loadPhotos()

subscribeRealtime()

subscribeBroadcast()

}

start()

</script>

</body>
</html>
