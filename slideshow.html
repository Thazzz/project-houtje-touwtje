<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chris10's PhotoWall</title>

<link rel="stylesheet" href="feest.css">

</head>

<body>

<div id="container">

<div id="overlay">
Chris10's PhotoWall
<div id="sub">
📸 Scan de QR code en upload je foto
</div>
</div>

<div id="spotlight"></div>

<div id="newphoto">Nieuwe foto! 📸</div>

<div id="photowall"></div>

<div id="qrbox">
<div id="qr"></div>
<div id="qrtext">Scan om foto's te uploaden</div>
</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>

console.log("photowall gestart")

/* --------------------------
SUPABASE
-------------------------- */

const supabaseUrl = "https://gfhnjiyslyualbfbvzmb.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmaG5qaXlzbHl1YWxiZmJ2em1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgwOTQsImV4cCI6MjA4ODc5NDA5NH0.fOIy6UCpEuYWVBcBpGnr64s8Ua3qjEzRv-WLXJKAfgw"

const supabaseClient = supabase.createClient(
supabaseUrl,
supabaseKey
)

/* --------------------------
DATA
-------------------------- */

let photos=[]
let knownFiles=new Set()

let idleTimer
let slideshowIndex=0
let slideshowRunning=false

/* --------------------------
CHANNEL
-------------------------- */

const photoChannel=new BroadcastChannel("party-photos")

/* --------------------------
SPOTLIGHT
-------------------------- */

function showSpotlight(url,isNew=true){

const container=document.getElementById("spotlight")

container.innerHTML=""

const img=document.createElement("img")

img.src=url
img.className="spotlight-photo"

container.appendChild(img)

setTimeout(()=>{
img.classList.add("show")
},50)

/* na 3 seconden */

setTimeout(()=>{

img.classList.remove("show")

setTimeout(()=>{

container.innerHTML=""

if(isNew){
addPhotoToWall(url)
}

},600)

},3000)

}

/* --------------------------
PHOTO WALL
-------------------------- */

const wallPositions = [

{left:10, top:10},
{left:30, top:8},
{left:50, top:10},
{left:70, top:12},

{left:20, top:28},
{left:40, top:25},
{left:60, top:30},

{left:8, top:45},
{left:30, top:48},
{left:50, top:45},
{left:72, top:50},

{left:22, top:65},
{left:42, top:68},
{left:62, top:65},

{left:40, top:82}

]

function addPhotoToWall(url){

const wall = document.getElementById("photowall")

const img = document.createElement("img")

img.src = url
img.className = "wall-photo drop"

/* positie kiezen */

const index = wall.children.length % wallPositions.length
const base = wallPositions[index]

/* kleine variatie */

const offsetX = (Math.random()*10)-5
const offsetY = (Math.random()*10)-5

img.style.left = (base.left + offsetX) + "%"
img.style.top = (base.top + offsetY) + "%"

/* rotatie */

img.style.setProperty(
"--r",
(Math.random()*14 - 7) + "deg"
)

/* lichte schaal */

const scale = 0.95 + Math.random()*0.1
img.style.transform += " scale(" + scale + ")"

/* nieuwe foto bovenop stapel */

img.style.zIndex = wallZ++

wall.appendChild(img)

/* max 15 foto's */

if(wall.children.length > 15){

wall.removeChild(wall.children[0])

}

}

/* --------------------------
BANNER
-------------------------- */

function showNewPhotoBanner(){

const banner=document.getElementById("newphoto")

banner.style.opacity=1

setTimeout(()=>{
banner.style.opacity=0
},3000)

}

/* --------------------------
QR FLASH
-------------------------- */

function flashQR(){

const qr=document.getElementById("qrbox")

qr.classList.remove("qr-flash")

void qr.offsetWidth

qr.classList.add("qr-flash")

}

/* --------------------------
HANDLE NEW PHOTO
-------------------------- */

function handleNewPhoto(url){

if(knownFiles.has(url)) return

knownFiles.add(url)

photos.unshift(url)

showNewPhotoBanner()

flashQR()

showSpotlight(url,true)

resetIdleTimer()

}

/* --------------------------
LOAD PHOTOS
-------------------------- */

async function loadPhotos(){

let allFiles=[]
let offset=0
const limit=100

while(true){

const {data,error}=await supabaseClient
.storage
.from("party")
.list("",{
limit:limit,
offset:offset,
sortBy:{column:"name",order:"desc"}
})

if(error){
console.log(error)
return
}

if(!data || data.length===0) break

allFiles=allFiles.concat(data)

if(data.length<limit) break

offset+=limit

}

for(const file of allFiles){

const url=
supabaseUrl+"/storage/v1/object/public/party/"+file.name

knownFiles.add(url)
photos.push(url)

}

/* start muur met laatste foto's */

for(const url of photos.slice(0,15)){
addPhotoToWall(url)
}

}

/* --------------------------
REALTIME
-------------------------- */

function subscribeRealtime(){

supabaseClient
.channel("party-upload")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"storage",
table:"objects",
filter:"bucket_id=eq.party"
},
(payload)=>{

const file=payload.new.name

const url=
supabaseUrl+"/storage/v1/object/public/party/"+file

handleNewPhoto(url)

}
)
.subscribe()

}

/* --------------------------
BROADCAST
-------------------------- */

function subscribeBroadcast(){

supabaseClient
.channel("party-live")
.on("broadcast",{event:"new-photo"},(payload)=>{

const url=payload.payload.url

handleNewPhoto(url)

})
.subscribe()

}

/* --------------------------
LOCAL CHANNEL
-------------------------- */

photoChannel.onmessage=(event)=>{

handleNewPhoto(event.data)

}

/* --------------------------
QR
-------------------------- */

function createQR(){

const uploadURL=window.location.origin+"/upload.html"

new QRCode(document.getElementById("qr"),{
text:uploadURL,
width:150,
height:150
})

}

/* --------------------------
IDLE TIMER
-------------------------- */

function resetIdleTimer(){

clearTimeout(idleTimer)

slideshowRunning=false

idleTimer=setTimeout(startIdleSlideshow,15000)

}

function startIdleSlideshow(){

if(photos.length===0) return

slideshowRunning=true

showNextIdlePhoto()

}

function showNextIdlePhoto(){

if(!slideshowRunning) return

if(photos.length===0) return

const url=photos[slideshowIndex%photos.length]

slideshowIndex++

showSpotlight(url,false)

setTimeout(showNextIdlePhoto,15000)

}

/* --------------------------
START
-------------------------- */

async function start(){

createQR()

await loadPhotos()

subscribeRealtime()

subscribeBroadcast()

resetIdleTimer()

}

start()

</script>

</body>
</html>
