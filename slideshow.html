<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chris10's PhotoWall</title>

<link rel="stylesheet" href="feest.css">

</head>

<body>

<div id="container">

<div id="overlay">
Chris10's PhotoWall
<div id="sub">
📸 Scan de QR code en upload je foto
</div>
</div>

<div id="spotlight"></div>

<div id="newphoto">Nieuwe foto! 📸</div>

<div id="photowall"></div>

<div id="qrbox">
<div id="qr"></div>
<div id="qrtext">Scan om foto's te uploaden</div>
</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>

console.log("photowall gestart")

/* --------------------------
SUPABASE
-------------------------- */

const supabaseUrl = "https://gfhnjiyslyualbfbvzmb.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmaG5qaXlzbHl1YWxiZmJ2em1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgwOTQsImV4cCI6MjA4ODc5NDA5NH0.fOIy6UCpEuYWVBcBpGnr64s8Ua3qjEzRv-WLXJKAfgw"

const supabaseClient = supabase.createClient(
supabaseUrl,
supabaseKey
)

/* --------------------------
DATA
-------------------------- */

let photos=[]
let knownFiles=new Set()

let idleTimer

let slideshowRunning=false

let idleSlideshowTimer

let wallZ = 10

let lastIdlePhoto=null

/* --------------------------
CHANNEL
-------------------------- */

const photoChannel=new BroadcastChannel("party-photos")

/* --------------------------
SPOTLIGHT
-------------------------- */

function showSpotlight(url,isNew=true){

const container=document.getElementById("spotlight")

container.innerHTML=""

const img=document.createElement("img")

img.src=url
img.className="spotlight-photo"

container.appendChild(img)

setTimeout(()=>{
img.classList.add("show")
},50)

/* na 3 seconden */

setTimeout(()=>{

img.classList.remove("show")

setTimeout(()=>{

container.innerHTML=""

if(isNew){
addPhotoToWall(url)
}

},600)

},3000)

}

/* --------------------------
PHOTO WALL
-------------------------- */

function addPhotoToWall(url){

const wall = document.getElementById("photowall")

const img = document.createElement("img")

img.src = url
img.className = "wall-photo drop"

/* positie kiezen */

const base = {
left: 10 + Math.random()*75,
top: 10 + Math.random()*75
}

/* kleine variatie */

const offsetX = (Math.random()*18)-9
const offsetY = (Math.random()*18)-9

const finalLeft = (base.left + offsetX)
const finalTop = (base.top + offsetY)

/* start in midden */

img.style.left = (48 + Math.random()*4) + "%"
img.style.top = (48 + Math.random()*4) + "%"
img.style.transform = "translate(-50%,-50%) rotate(0deg) scale(.6)"
img.style.opacity = "0"
/* rotatie */

img.style.setProperty(
"--r",
(Math.random()*24 - 12) + "deg"
)

/* lichte schaduw variatie */

const shadowX = 18 + Math.random()*10
const shadowY = 40 + Math.random()*30
const shadowBlur = 60 + Math.random()*40
const shadowOpacity = 0.65 + Math.random()*0.2

img.style.setProperty(
"--shadow",
`${shadowX}px ${shadowY}px ${shadowBlur}px rgba(0,0,0,${shadowOpacity}), 0 0 20px rgba(255,0,120,0.12)`
)


/* nieuwe foto bovenop stapel */

img.style.zIndex = wallZ++

wall.appendChild(img)

requestAnimationFrame(()=>{

img.style.transition =
"left 1s cubic-bezier(.25,.8,.25,1), top 1s cubic-bezier(.25,.8,.25,1), transform .6s ease"

img.style.left = finalLeft + "%"
img.style.top = finalTop + "%"
img.style.opacity = "1"

img.style.transform =
"translate(-50%,-50%) rotate(var(--r)) scale(1)"

})

setTimeout(()=>{
img.classList.add("land")
},900)


/* max 15 foto's */

if(wall.children.length > 15){

wall.removeChild(wall.children[0])

}

}

/* --------------------------
BANNER
-------------------------- */

function showNewPhotoBanner(){

const banner=document.getElementById("newphoto")

banner.style.opacity=1

setTimeout(()=>{
banner.style.opacity=0
},3000)

}

/* --------------------------
QR FLASH
-------------------------- */

function flashQR(){

const qr=document.getElementById("qrbox")

qr.classList.remove("qr-flash")

void qr.offsetWidth

qr.classList.add("qr-flash")

}

/* --------------------------
lichtpuls nieuwe foto
-------------------------- */

function pulseTitle(){

const title=document.getElementById("overlay")

title.classList.remove("title-pulse")

void title.offsetWidth

title.classList.add("title-pulse")

}


/* --------------------------
HANDLE NEW PHOTO
-------------------------- */

function handleNewPhoto(url){

if(knownFiles.has(url)) return

knownFiles.add(url)

photos.unshift(url)

/* slideshow pauzeren */

clearTimeout(idleSlideshowTimer)
slideshowRunning=false

showNewPhotoBanner()

flashQR()

pulseTitle()

showSpotlight(url,true)

/* idle opnieuw starten */

resetIdleTimer()

}

/* --------------------------
LOAD PHOTOS
-------------------------- */

async function loadPhotos(){

let allFiles=[]
let offset=0
const limit=100

while(true){

const {data,error}=await supabaseClient
.storage
.from("party")
.list("",{
limit:limit,
offset:offset,
sortBy:{column:"name",order:"desc"}
})

if(error){
console.log(error)
return
}

if(!data || data.length===0) break

allFiles=allFiles.concat(data)

if(data.length<limit) break

offset+=limit

}

for(const file of allFiles){

if(!file.name || file.name.endsWith("/")) continue

const url =
supabaseUrl+"/storage/v1/object/public/party/"+file.name

knownFiles.add(url)
photos.push(url)

}
/* start muur met laatste foto's */

for(const url of photos.slice(0,15)){
addPhotoInstant(url)
}

}

/* --------------------------
REALTIME
-------------------------- */

function subscribeRealtime(){

supabaseClient
.channel("party-upload")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"storage",
table:"objects",
filter:"bucket_id=eq.party"
},
(payload)=>{

if(!payload.new.name) return

const file=payload.new.name

const url=
supabaseUrl+"/storage/v1/object/public/party/"+file

handleNewPhoto(url)

}
)
.subscribe()

}

/* --------------------------
BROADCAST
-------------------------- */

function subscribeBroadcast(){

supabaseClient
.channel("party-live")
.on("broadcast",{event:"new-photo"},(payload)=>{

const url=payload.payload.url

handleNewPhoto(url)

})
.subscribe()

}

/* --------------------------
LOCAL CHANNEL
-------------------------- */

photoChannel.onmessage=(event)=>{

handleNewPhoto(event.data)

}

/* --------------------------
QR
-------------------------- */

function createQR(){

const uploadURL=window.location.origin+"/upload.html"

new QRCode(document.getElementById("qr"),{
text:uploadURL,
width:150,
height:150
})

}

/* --------------------------
IDLE TIMER
-------------------------- */

function resetIdleTimer(){

clearTimeout(idleTimer)

slideshowRunning=false

idleTimer=setTimeout(startIdleSlideshow,6000)

}

function startIdleSlideshow(){

if(photos.length===0) return

clearTimeout(idleSlideshowTimer)

slideshowRunning=true

showNextIdlePhoto()

}

function showNextIdlePhoto(){

if(!slideshowRunning) return
if(photos.length===0) return

let url

do{

url = photos[Math.floor(Math.random()*photos.length)]

}while(photos.length>1 && url===lastIdlePhoto)

lastIdlePhoto=url

showSpotlight(url,true)

idleSlideshowTimer=setTimeout(showNextIdlePhoto,6000)

}

/* --------------------------
START
-------------------------- */

async function start(){

createQR()

await loadPhotos()

subscribeRealtime()

subscribeBroadcast()

resetIdleTimer()

}

/* --------------------------
PHOTO WALL
-------------------------- */

function addPhotoInstant(url){

const wall = document.getElementById("photowall")

const img = document.createElement("img")

img.src = url
img.className = "wall-photo"

img.style.left = (10 + Math.random()*75) + "%"
img.style.top = (10 + Math.random()*75) + "%"

img.style.setProperty("--r",(Math.random()*24 - 12)+"deg")

img.style.zIndex = wallZ++

wall.appendChild(img)

}

start()

</script>

</body>
</html>
