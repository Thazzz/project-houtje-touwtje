<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chris10's PhotoWall</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link rel="stylesheet" href="feest.css">

<link href="https://fonts.googleapis.com/css2?family=Neon+Tubes&display=swap" rel="stylesheet">

</head>

<body>

<div id="container">

<div id="overlay">
Chris10's PhotoWall
<div id="sub">
📸 Scan de QR code en upload je foto
</div>
</div>

<div id="spotlight">

<div id="photo-flash"></div>

<div id="caption"></div>
</div>

<div id="newphoto">Nieuwe foto! 📸</div>

<div id="photowall"></div>

<div id="qrbox">
<div id="qr"></div>
<div id="qrtext">Scan om foto's te uploaden</div>
</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>

console.log("photowall gestart")

window.addEventListener("error", e=>{
console.log("GLOBAL ERROR:", e.message)
})

window.addEventListener("unhandledrejection", e=>{
console.log("PROMISE ERROR:", e.reason)
})

/* SUPABASE */

const supabaseUrl = "https://gfhnjiyslyualbfbvzmb.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmaG5qaXlzbHl1YWxiZmJ2em1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgwOTQsImV4cCI6MjA4ODc5NDA5NH0.fOIy6UCpEuYWVBcBpGnr64s8Ua3qjEzRv-WLXJKAfgw"

const supabaseClient = supabase.createClient(
supabaseUrl,
supabaseKey
)

/* DATA */

let photos=[]
let knownFiles=new Set()
let captions={}

let shuffledPhotos=[]
let shuffleIndex=0

let idleTimer
let idleSlideshowTimer

let slideshowRunning=false
let spotlightActive=false
let lastIdlePhoto=null

let wallZ = 10

const MAX_WALL_PHOTOS = 15
const WALL_COLS = 5
const WALL_ROWS = 3

let spotlightQueue=[]
let spotlightBusy=false

const SPOTLIGHT_DURATION = 3000
const SLIDESHOW_MESSAGES = [
"Nieuwe foto!",
"Vers van de camera",
"Nieuw moment in beeld",
"De muur groeit",
"Nog meer herinneringen",
"Feest in beeld",
"Weer een mooie erbij",
"Dit wordt een mooie verzameling",
"Binnengekomen!",
"De tafel leeft"
]
let lastBannerMessage = ""

/* LOCAL CHANNEL */

const photoChannel=new BroadcastChannel("party-photos")

/* SPOTLIGHT */

function showSpotlight(url,isNew=true){

return new Promise(resolve=>{

if(spotlightActive){
resolve()
return
}

spotlightActive=true

const container=document.getElementById("spotlight")
const caption=document.getElementById("caption")

container.querySelectorAll(".spotlight-photo").forEach(img=>img.remove())

const img=document.createElement("img")

img.src=url

img.onerror = () => {

console.log("❌ spotlight broken:", url)

photos = photos.filter(p => p !== url)
knownFiles.delete(url)

img.remove()

spotlightActive=false
resolve()

}

img.className="spotlight-photo"

container.appendChild(img)

/* caption tonen */

const fileName = url.split("/").pop()

let attempts = 0

function tryCaption(){

const text = captions[fileName]

if(text){
showCaption(text)
return
}

attempts++

if(attempts < 10){
setTimeout(tryCaption,100)
}

}

tryCaption()

/* foto fade-in */

setTimeout(()=>{
img.classList.add("show")
photoFlash()
},50)

/* spotlight duur */

setTimeout(()=>{

img.classList.remove("show")

setTimeout(()=>{

caption.classList.remove("show")

/* foto eerst naar muur */
addPhotoToWall(url)

/* spotlight foto rustig weg */
img.style.transition="opacity .6s ease"
img.style.opacity="0"

setTimeout(()=>{

img.remove()
spotlightActive=false
resolve()

},600)

},900)

},SPOTLIGHT_DURATION)
})

}

/* photoflash */
function photoFlash(){

const flash=document.getElementById("photo-flash")

flash.classList.remove("photo-flash")

void flash.offsetWidth

flash.classList.add("photo-flash")

}


/* CAPTION */

function showCaption(text){

if(!text) return

const el=document.getElementById("caption")

el.innerText=text

const colors=[
"#ff3cac",
"#ff8a00",
"#00ffd5",
"#ffe600",
"#ff4f81",
"#7cff00"
]

const color=colors[Math.floor(Math.random()*colors.length)]

el.style.color=color

el.classList.remove("show")
void el.offsetWidth
el.classList.add("show")

setTimeout(()=>{
el.classList.remove("show")
},3000)

}

/* SPOTLIGHT QUEUE */

function enqueueSpotlight(url,isNew=true){

spotlightQueue.push({url,isNew})

if(!spotlightBusy){
processSpotlightQueue()
}

}

async function processSpotlightQueue(){

if(spotlightBusy) return

spotlightBusy = true

while(spotlightQueue.length > 0){

const item = spotlightQueue.shift()

try{

await showSpotlight(item.url,item.isNew)

}catch(e){

console.log("spotlight error",e)

}

}

spotlightBusy = false

}

/* CHECK PHOTO ON TABLE */

function photoAlreadyOnWall(url){

const wall=document.getElementById("photowall")

for(const img of wall.children){
if(img.src===url) return true
}

return false

}

/* RANDOM OLD PHOTOS */

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1))

;[array[i],array[j]]=[array[j],array[i]]

}

}

/* GRID POSITION */

function getGridPosition(){

const cellW = 80 / WALL_COLS
const cellH = 70 / WALL_ROWS

const col = Math.floor(Math.random()*WALL_COLS)
const row = Math.floor(Math.random()*WALL_ROWS)

/* basispositie */

let left = 10 + col * cellW
let top = 10 + row * cellH

/* kleine random offset */

left += (Math.random()*cellW*0.6)
top += (Math.random()*cellH*0.6)

return {left,top}

}


/* PHOTO WALL */

function addPhotoToWall(url){

if(photoAlreadyOnWall(url)) return

const wall=document.getElementById("photowall")

const img=document.createElement("img")

img.src=url

img.onerror = () => {

console.log("❌ broken image:", url)

/* verwijder uit arrays */

photos = photos.filter(p => p !== url)

knownFiles.delete(url)

/* verwijder element indien al geplaatst */

if(img.parentNode){
img.parentNode.removeChild(img)
}

}

img.className="wall-photo drop"

/* random positie */

const pos = getGridPosition()

const finalLeft = pos.left
const finalTop = pos.top

/* start midden */

img.style.left=finalLeft+"%"
img.style.top="-20%"
img.style.transform="translate(-50%,-50%)"
img.style.opacity="0"

/* rotatie */

img.style.setProperty(
"--r",
(Math.random()*24-12)+"deg"
)

img.style.setProperty("--i", Math.random()*20)

/* schaduw */

const shadowX=18+Math.random()*10
const shadowY=40+Math.random()*30
const shadowBlur=60+Math.random()*40
const shadowOpacity=0.65+Math.random()*0.2

img.style.setProperty(
"--shadow",
`${shadowX}px ${shadowY}px ${shadowBlur}px rgba(0,0,0,${shadowOpacity})`
)

/* stapel */

img.style.zIndex=wallZ++

/* glide animatie */

requestAnimationFrame(()=>{

img.style.transition=
"top 1.2s cubic-bezier(.22,1.4,.36,1), transform .8s ease"

img.style.left=finalLeft+"%"
img.style.top=finalTop+"%"
img.style.opacity="1"

img.style.transform=
"translate(-50%,-50%) rotate(var(--r)) scale(1)"

})

setTimeout(()=>{
img.classList.add("land")
},900)

/* max foto's */

if(wall.children.length>=MAX_WALL_PHOTOS){

const old=wall.children[0]

old.style.transition="opacity .6s"
old.style.opacity="0"

setTimeout(()=>{
if(old.parentNode){
old.parentNode.removeChild(old)
}
},600)

}

wall.appendChild(img)

}

/* BANNER */

function showNewPhotoBanner(){

const banner=document.getElementById("newphoto")

let message = SLIDESHOW_MESSAGES[Math.floor(Math.random()*SLIDESHOW_MESSAGES.length)]

if(SLIDESHOW_MESSAGES.length > 1){
while(message === lastBannerMessage){
message = SLIDESHOW_MESSAGES[Math.floor(Math.random()*SLIDESHOW_MESSAGES.length)]
}
}

lastBannerMessage = message
banner.innerText = message

banner.style.opacity=1

setTimeout(()=>{
banner.style.opacity=0
},3000)

}

/* QR FLASH */

function flashQR(){

const qr=document.getElementById("qrbox")

qr.classList.remove("qr-flash")

void qr.offsetWidth

qr.classList.add("qr-flash")

}

/* TITLE PULSE */

function pulseTitle(){

const title=document.getElementById("overlay")

title.classList.remove("title-pulse")

void title.offsetWidth

title.classList.add("title-pulse")

}

/* NEW PHOTO */

async function handleNewPhoto(url){

if(knownFiles.has(url)) return

knownFiles.add(url)
photos.push(url)

if(photos.length > 300){
photos.shift()
}

const fileName = url.split("/").pop()

/* caption ophalen indien nodig */

if(!captions[fileName]){

try{

const {data,error}=await supabaseClient
.from("photos")
.select("caption")
.eq("filename",fileName)
.maybeSingle()

if(!error && data && data.caption){
captions[fileName] = data.caption
}

}catch(e){
console.log("caption fetch error",e)
}

}

/* slideshow pauzeren */

clearTimeout(idleSlideshowTimer)
slideshowRunning=false

/* visuele feedback */

showNewPhotoBanner()
flashQR()
pulseTitle()

/* spotlight pas nu starten */

enqueueSpotlight(url,true)

/* idle opnieuw starten */

resetIdleTimer()

}

/* LOAD PHOTOS */

async function loadPhotos(){

let allFiles=[]
let offset=0
const limit=500

/* captions eerst laden */

try{

const {data:rows,error}=await supabaseClient
.from("photos")
.select("filename,caption")

if(!error && rows){
for(const row of rows){
captions[row.filename]=row.caption
}
}

}catch(e){
console.log("caption load error",e)
}

/* daarna storage foto's ophalen */

while(true){

const {data,error}=await supabaseClient
.storage
.from("party")
.list("",{
limit:limit,
offset:offset,
sortBy:{column:"name",order:"desc"}
})

if(error){
console.log(error)
return
}

if(!data || data.length===0) break

allFiles=allFiles.concat(data)

if(data.length < limit) break

offset+=limit

}

/* urls maken */

for(const file of allFiles){

if(!file.name || file.name.endsWith("/")) continue

const url =
supabaseUrl + "/storage/v1/object/public/party/" + file.name

if(!knownFiles.has(url)){

knownFiles.add(url)

if(photos.length < 300){
photos.push(url)
}

}

}

/* muur starten */

for(const url of photos.slice(0,15)){
addPhotoInstant(url)
}

}

/* BROADCAST */

function subscribeBroadcast(){

supabaseClient
.channel("party-live")
.on("broadcast",{event:"new-photo"},(payload)=>{

const url = payload.payload.url
const caption = payload.payload.caption

const fileName = url.split("/").pop()

captions[fileName] = caption || null

handleNewPhoto(url)

})
.subscribe()

}

/* LOCAL CHANNEL */

photoChannel.onmessage=(event)=>{

handleNewPhoto(event.data)

}

/* QR */

function createQR(){

const uploadURL=window.location.origin+"/upload.html"

new QRCode(document.getElementById("qr"),{
text:uploadURL,
width:150,
height:150
})

}

/* IDLE TIMER */

function resetIdleTimer(){

clearTimeout(idleTimer)

slideshowRunning=false

idleTimer=setTimeout(startIdleSlideshow,6000)

}

function startIdleSlideshow(){

if(photos.length===0) return

clearTimeout(idleSlideshowTimer)

slideshowRunning=true

showNextIdlePhoto()

}

function showNextIdlePhoto(){

if(!slideshowRunning) return
if(photos.length===0) return
if(spotlightBusy){

idleSlideshowTimer=setTimeout(showNextIdlePhoto,2000)

return

}
let url
let attempts=0

do{

if(shuffledPhotos.length !== photos.length){
shuffledPhotos = [...photos]
shuffle(shuffledPhotos)
shuffleIndex = 0
}

if(shuffleIndex >= shuffledPhotos.length){
shuffle(shuffledPhotos)
shuffleIndex = 0
}

url = shuffledPhotos[shuffleIndex++]

if(photoAlreadyOnWall(url)){
continue
}

attempts++

}while(
photos.length>1 &&
(url===lastIdlePhoto) &&
attempts<20
)

lastIdlePhoto=url

enqueueSpotlight(url,false)

idleSlideshowTimer=setTimeout(showNextIdlePhoto,6000)

}


/* START */

async function start(){

createQR()

await loadPhotos()

subscribeBroadcast()

resetIdleTimer()

}

/* START WALL */

function addPhotoInstant(url){

const wall=document.getElementById("photowall")

const img=document.createElement("img")

img.src=url
img.className="wall-photo"

img.style.left=(10+Math.random()*75)+"%"
img.style.top=(10+Math.random()*75)+"%"

img.style.setProperty("--r",(Math.random()*24-12)+"deg")

img.style.zIndex=wallZ++

wall.appendChild(img)

}

start()

</script>

</body>
</html>
