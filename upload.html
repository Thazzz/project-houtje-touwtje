<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload je foto's</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<style>

body{
background:
radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 60%),
#111;

color:#eee;
font-family:system-ui;
margin:0;
padding:40px 20px;
text-align:center;
}

/* titels */

h1{
font-size:34px;
margin-bottom:6px;
letter-spacing:.5px;

text-shadow:
0 0 8px rgba(255,255,255,0.3),
0 0 18px rgba(255,0,150,0.15);
}

h2{
font-weight:400;
font-size:18px;
opacity:.8;
margin-bottom:30px;
}

/* knoppen */

button{
margin-top:16px;
padding:18px 30px;

font-size:18px;

background:linear-gradient(
135deg,
#444,
#222
);

color:white;

border:none;
border-radius:10px;

box-shadow:
0 10px 25px rgba(0,0,0,0.5),
0 0 12px rgba(255,0,150,0.1);

transition:all .2s ease;

cursor:pointer;
}

button:hover{
transform:translateY(-2px);
box-shadow:
0 14px 35px rgba(0,0,0,0.6),
0 0 18px rgba(255,0,150,0.2);
}

/* preview grid */

.preview{
margin-top:30px;

display:flex;
flex-wrap:wrap;
justify-content:center;

gap:14px;
}

/* foto preview */

.preview img{
width:90px;
height:90px;

object-fit:cover;

border-radius:6px;

box-shadow:
0 8px 20px rgba(0,0,0,0.6);

background:white;
padding:4px;
}

/* progress bar */

.progress{
margin-top:30px;

width:100%;
max-width:400px;
margin-left:auto;
margin-right:auto;

background:#333;

border-radius:6px;
height:14px;

overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;

background:linear-gradient(
90deg,
#ff4fa3,
#6be675
);

transition:width .2s;
}

/* status */

#status{
margin-top:14px;
opacity:.8;
}
</style>

</head>

<body>

<h1>Chris10's PhotoWall</h1>
<h2>Laat jouw moment achter voor Chris10</h2>

<!-- verborgen inputs -->

<input
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
multiple
style="display:none"
>

<input
type="file"
id="galleryInput"
accept="image/*"
multiple
style="display:none"
>

<!-- knoppen -->

<button onclick="openCamera()">📷 Maak een foto</button>

<br>

<button onclick="openGallery()">🖼 Kies uit galerij</button>

<div class="preview" id="preview"></div>

<button onclick="startUpload()">⬆ Voeg toe aan de PhotoWall</button>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<script>

/* -------------------------
SUPABASE
------------------------- */

const supabaseUrl = "https://gfhnjiyslyualbfbvzmb.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmaG5qaXlzbHl1YWxiZmJ2em1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgwOTQsImV4cCI6MjA4ODc5NDA5NH0.fOIy6UCpEuYWVBcBpGnr64s8Ua3qjEzRv-WLXJKAfgw"

const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
)

/* -------------------------
FILE SELECTIE
------------------------- */

let selectedFiles=[]

const MAX_UPLOAD_FILES = 3

const preview = document.getElementById("preview")

function openCamera(){
document.getElementById("cameraInput").click()
}

function openGallery(){
document.getElementById("galleryInput").click()
}

function handleFiles(files){

for(const file of files){

if(selectedFiles.length >= MAX_UPLOAD_FILES){

alert("Maximaal 3 foto's per keer uploaden 📸")
break

}

selectedFiles.push(file)

const img=document.createElement("img")
img.src=URL.createObjectURL(file)

img.onload = () => URL.revokeObjectURL(img.src)

preview.appendChild(img)

}

}
const cameraInput = document.getElementById("cameraInput")
const galleryInput = document.getElementById("galleryInput")

cameraInput.addEventListener("change",function(){
handleFiles(this.files)
})


galleryInput.addEventListener("change",function(){
handleFiles(this.files)
})

/* -------------------------
IMAGE PROCESSING (PRINT SAFE)
------------------------- */

async function processImage(file){

return new Promise(resolve=>{

const img = new Image()
const url = URL.createObjectURL(file)

img.onload = function(){

let width = img.width
let height = img.height

/* maximale resolutie */

const max = 2200

/* resize lange zijde */

if(width > height && width > max){
height = height * (max / width)
width = max
}

if(height > width && height > max){
width = width * (max / height)
height = max
}

/* canvas */

const canvas = document.createElement("canvas")
const ctx = canvas.getContext("2d")

canvas.width = width
canvas.height = height

ctx.drawImage(img,0,0,width,height)

/* compressie */

canvas.toBlob(blob=>{

URL.revokeObjectURL(url)

if(!blob){
resolve(file)
return
}

resolve(blob)

},"image/jpeg",0.90)

}

img.src = url

})

}/* -------------------------
LOCAL BROADCAST
------------------------- */

const photoChannel = new BroadcastChannel("party-photos")

/* -------------------------
UPLOAD
------------------------- */

async function uploadSingle(file){

const processed = await processImage(file)

const fileName =
Date.now() + "-" + crypto.randomUUID() + ".jpg"

const { error } = await supabaseClient.storage
.from("party")
.upload(fileName,processed,{contentType:"image/jpeg"})

if(error){
console.log(error)
throw error
}

const publicURL =
supabaseUrl + "/storage/v1/object/public/party/" + fileName

/* instant lokaal */

photoChannel.postMessage(publicURL)


}
/* -------------------------
QUEUE
------------------------- */

async function runQueue(files,concurrency=3){

let index=0
let completed=0

const progressBar=document.getElementById("progressBar")
const status=document.getElementById("status")

return new Promise(resolve=>{

async function worker(){

while(index<files.length){

const current=index++
const file=files[current]

status.innerText="Foto verwerken..."

try{
await uploadSingle(file)
}catch(e){
console.log(e)
}

completed++

progressBar.style.width=
Math.round((completed/files.length)*100)+"%"

}

}

let workers=[]

for(let i=0;i<concurrency;i++){
workers.push(worker())
}

Promise.all(workers).then(resolve)

})

}

/* -------------------------
START UPLOAD
------------------------- */

async function startUpload(){

const files = selectedFiles
const status = document.getElementById("status")
const uploadButton = document.querySelector('button[onclick="startUpload()"]')

if(files.length===0){
status.innerText="Kies eerst foto's"
return
}

if(files.length > MAX_UPLOAD_FILES){
status.innerText="Maximaal 3 foto's tegelijk"
return
}

/* knop uitzetten tijdens upload */

uploadButton.disabled = true
uploadButton.style.opacity = .6
uploadButton.style.cursor = "not-allowed"

status.innerText="Upload gestart..."

await runQueue(files,3)

status.innerText="Foto's geüpload 🎉"

/* reset */

selectedFiles = []
preview.innerHTML = ""

/* knop weer actief maken */

uploadButton.disabled = false
uploadButton.style.opacity = 1
uploadButton.style.cursor = "pointer"

}
</script>

</body>
</html>
