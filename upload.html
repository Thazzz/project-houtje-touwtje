<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload je foto's</title>

<style>

body{
background:#111;
color:#eee;
font-family:system-ui;
margin:0;
padding:20px;
text-align:center;
}

input{margin-top:20px;font-size:18px;}

button{
margin-top:20px;
padding:16px 28px;
font-size:18px;
background:#333;
color:white;
border:none;
border-radius:8px;
}

.preview{
margin-top:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:6px;
}

.progress{
margin-top:20px;
width:100%;
background:#333;
border-radius:6px;
height:14px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#6be675;
transition:width .2s;
}

</style>

</head>

<body>

<h1>📸 Upload je foto's</h1>

<p>Maak een foto of kies uit je galerij</p>

<input
type="file"
id="fileInput"
accept="image/*"
capture="environment"
multiple
>

<div class="preview" id="preview"></div>

<button onclick="startUpload()">Upload foto's</button>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<script>

/* -------------------------
SUPABASE
------------------------- */

const supabaseUrl = "https://gfhnjiyslyualbfbvzmb.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmaG5qaXlzbHl1YWxiZmJ2em1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgwOTQsImV4cCI6MjA4ODc5NDA5NH0.fOIy6UCpEuYWVBcBpGnr64s8Ua3qjEzRv-WLXJKAfgw"

const { createClient } = supabase
const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
)

/* -------------------------
PREVIEW
------------------------- */

fileInput.addEventListener("change", function(){

preview.innerHTML=""

for(const file of this.files){

const img=document.createElement("img")
img.src=URL.createObjectURL(file)

preview.appendChild(img)

}

})

/* -------------------------
IMAGE PROCESSING
HEIC → JPEG
ROTATION FIX
COMPRESSION
------------------------- */

async function processImage(file){

return new Promise(resolve=>{

const reader=new FileReader()
const img=new Image()

reader.onload=e=>img.src=e.target.result
reader.readAsDataURL(file)

img.onload=function(){

EXIF.getData(img,function(){

let orientation=EXIF.getTag(this,"Orientation")

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

let width=img.width
let height=img.height

const max=1400

if(width>height && width>max){
height*=max/width
width=max
}

if(height>width && height>max){
width*=max/height
height=max
}

canvas.width=width
canvas.height=height

if(orientation===6){
canvas.width=height
canvas.height=width
ctx.rotate(90*Math.PI/180)
ctx.drawImage(img,0,-height,width,height)
}
else if(orientation===8){
canvas.width=height
canvas.height=width
ctx.rotate(-90*Math.PI/180)
ctx.drawImage(img,-width,0,width,height)
}
else{
ctx.drawImage(img,0,0,width,height)
}

canvas.toBlob(blob=>{

if(!blob){
resolve(file)
return
}

resolve(blob)

},"image/jpeg",0.75)

})

}

})

}

/* -------------------------
UPLOAD
------------------------- */

async function uploadSingle(file){

const processed = await processImage(file)

const fileName = crypto.randomUUID()+".jpg"

const { error } = await supabaseClient.storage
.from("party")
.upload(fileName,processed,{contentType:"image/jpeg"})

if(error){
console.log(error)
throw error
}

}

/* -------------------------
SMART QUEUE
------------------------- */

async function runQueue(files,concurrency=3){

let index=0
let completed=0

const progressBar=document.getElementById("progressBar")
const status=document.getElementById("status")

return new Promise(resolve=>{

async function worker(){

while(index<files.length){

const current=index++
const file=files[current]

status.innerText="Foto verwerken..."

try{

await uploadSingle(file)

}catch(e){

console.log(e)

}

completed++

progressBar.style.width=
Math.round((completed/files.length)*100)+"%"

}

}

let workers=[]

for(let i=0;i<concurrency;i++){

workers.push(worker())

}

Promise.all(workers).then(resolve)

})

}

/* -------------------------
START
------------------------- */

async function startUpload(){

const files=[...fileInput.files]
const status=document.getElementById("status")

if(files.length===0){
status.innerText="Kies eerst foto's"
return
}

status.innerText="Upload gestart..."

await runQueue(files,3)

status.innerText="Foto's geüpload 🎉"

fileInput.value=""
preview.innerHTML=""

}

</script>

</body>
</html>
