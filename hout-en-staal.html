<img src="images/hout&staal/keuken-2.jpeg" onclick="openLightbox(this)">

<div id="lightbox" class="lightbox">

<span class="lightbox-prev" onclick="prevImage()">❮</span>

<img id="lightbox-img">

<span class="lightbox-next" onclick="nextImage()">❯</span>

</div>

<script>

let galleryImages = [];
let currentIndex = 0;

function openLightbox(img){

galleryImages = Array.from(document.querySelectorAll(".gallery img"));
currentIndex = galleryImages.indexOf(img);

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

lightbox.style.display = "flex";
lightboxImg.src = img.src;

}

function closeLightbox(){
document.getElementById("lightbox").style.display = "none";
}

function showImage(index){

if(index < 0){
index = galleryImages.length - 1;
}

if(index >= galleryImages.length){
index = 0;
}

currentIndex = index;

document.getElementById("lightbox-img").src =
galleryImages[currentIndex].src;

}

function nextImage(){
showImage(currentIndex + 1);
}

function prevImage(){
showImage(currentIndex - 1);
}

document.addEventListener("keydown", function(e){

if(document.getElementById("lightbox").style.display === "flex"){

if(e.key === "ArrowRight"){
nextImage();
}

if(e.key === "ArrowLeft"){
prevImage();
}

if(e.key === "Escape"){
closeLightbox();
}

}

});

document.getElementById("lightbox").addEventListener("click", function(e){

if(e.target.id === "lightbox"){
closeLightbox();
}

});

</script>

</body>
